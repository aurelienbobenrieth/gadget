name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run validation suite
        run: pnpm run ci

      - name: Check generated docs are up to date
        run: |
          pnpm run docs:generate
          git diff --exit-code docs/eslint-plugin/reference/ || {
            echo "::error::Generated docs are out of date. Run 'pnpm run docs:generate' and commit the result."
            exit 1
          }
